<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <header>
        <h1 data-ui="title">Simple Web Games</h1>
        <p data-ui="subtitle">Pick a game and have fun!</p>
        <div class="lang-selector">
            <label for="lang-select" data-ui="language">Language</label>
            <select id="lang-select">
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="uk">Українська</option>
            </select>
        </div>
    </header>
    <main>
        <h2 id="games-list-heading" data-ui="gamesListLabel" style="position:absolute;left:-10000px;width:1px;height:1px;overflow:hidden;">Games list</h2>
        <div class="games-grid" aria-live="polite" aria-labelledby="games-list-heading">
            <!-- Game cards go here -->
        </div>
    </main>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
